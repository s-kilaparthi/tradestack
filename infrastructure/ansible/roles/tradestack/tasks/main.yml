---
- name: Clone TradeStack repository
  git:
    repo: https://github.com/s-kilaparthi/tradestack.git
    dest: /home/ubuntu/tradestack
    version: main
    force: yes

- name: Create .env file from vault secrets
  copy:
    content: |
      DB_HOST={{ db_host }}
      DB_NAME={{ db_name }}
      DB_USER={{ db_user }}
      DB_PASSWORD={{ db_password }}
      REDIS_HOST={{ redis_host }}
      REDIS_PORT={{ redis_port }}
    dest: /home/ubuntu/tradestack/.env
    mode: '0600'


- name: Start TradeStack with Docker Compose
  command: docker-compose up -d
  args:
    chdir: /home/ubuntu/tradestack

- name: Wait for PostgreSQL to be ready
  wait_for:
    host: localhost
    port: 5432
    delay: 10
    timeout: 60

- name: Create stock_prices table
  command: >
    docker exec tradestack-postgres psql -U tradestack -d tradestack -c
    "CREATE TABLE IF NOT EXISTS stock_prices (
    id SERIAL PRIMARY KEY,
    symbol VARCHAR(10) NOT NULL,
    price DECIMAL(10,2) NOT NULL,
    volume BIGINT,
    timestamp TIMESTAMP DEFAULT CURRENT_TIMESTAMP);"

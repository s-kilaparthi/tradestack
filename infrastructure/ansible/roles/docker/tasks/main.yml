---
- name: Update apt packages
  apt:
    update_cache: yes

- name: Install Docker
  apt:
    name:
      - docker.io
      - docker-compose
    state: present

- name: Start Docker service
  service:
    name: docker
    state: started
    enabled: yes

- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

- name: Expand root partition
  command: growpart /dev/nvme0n1 1
  ignore_errors: yes

- name: Resize filesystem
  command: resize2fs /dev/nvme0n1p1
  ignore_errors: yes

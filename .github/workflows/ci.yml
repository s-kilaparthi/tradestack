name: CI Pipeline

on:
  push:
    branches:
      - dev

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install producer dependencies
        run: pip install -r services/producer/requirements.txt pytest

      - name: Run producer tests
        run: pytest services/producer/test_producer.py -v

      - name: Install consumer dependencies
        run: pip install -r services/consumer/requirements.txt pytest

      - name: Run consumer tests
        run: pytest services/consumer/test_consumer.py -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit on producer
        run: bandit -r services/producer/producer.py

      - name: Run Bandit on consumer
        run: bandit -r services/consumer/consumer.py

  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build producer image
        run: docker build -t tradestack-producer services/producer/

      - name: Build consumer image
        run: docker build -t tradestack-consumer services/consumer/

      - name: Run Trivy on producer
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tradestack-producer
          severity: HIGH,CRITICAL

      - name: Run Trivy on consumer
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: tradestack-consumer
          severity: HIGH,CRITICAL
